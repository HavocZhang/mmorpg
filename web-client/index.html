<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MMO Gate - 压力测试客户端</title>
<style>
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --card-hover: #334155;
    --border: #475569;
    --text: #f1f5f9;
    --text-muted: #94a3b8;
    --accent: #3b82f6;
    --accent-hover: #2563eb;
    --green: #10b981;
    --green-bg: #064e3b;
    --red: #ef4444;
    --red-bg: #450a0a;
    --orange: #f59e0b;
    --orange-bg: #451a03;
    --purple: #8b5cf6;
    --purple-bg: #2e1065;
    --cyan: #06b6d4;
    --cyan-bg: #083344;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    overflow-x: hidden;
  }

  /* Layout */
  .app { display: flex; flex-direction: column; min-height: 100vh; }
  .main { display: flex; flex: 1; overflow: hidden; }
  .sidebar { width: 340px; min-width: 340px; background: var(--card); border-right: 1px solid var(--border); overflow-y: auto; padding: 16px; }
  .content { flex: 1; overflow-y: auto; padding: 16px; }

  /* Header */
  .header {
    background: linear-gradient(135deg, #1e3a5f 0%, #1e1b4b 100%);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .header h1 { font-size: 18px; font-weight: 700; }
  .header h1 span { color: var(--accent); }
  .header-status { display: flex; align-items: center; gap: 16px; font-size: 13px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
  .status-dot.online { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .status-dot.offline { background: var(--red); }

  /* Cards */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .card-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* Stats Grid */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 16px;
  }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    text-align: center;
    transition: border-color 0.2s;
  }
  .stat-card:hover { border-color: var(--accent); }
  .stat-card .label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .stat-card .value { font-size: 28px; font-weight: 700; margin-top: 4px; }
  .stat-card .sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .stat-green .value { color: var(--green); }
  .stat-blue .value { color: var(--accent); }
  .stat-orange .value { color: var(--orange); }
  .stat-red .value { color: var(--red); }
  .stat-purple .value { color: var(--purple); }

  /* Forms */
  .form-group { margin-bottom: 10px; }
  .form-group label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 8px 10px;
    font-size: 13px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    border-color: var(--accent);
  }
  .form-row { display: flex; gap: 8px; }
  .form-row > * { flex: 1; }

  /* Buttons */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 8px 16px;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
    white-space: nowrap;
  }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
  .btn-green { background: var(--green); color: white; }
  .btn-green:hover:not(:disabled) { background: #059669; }
  .btn-red { background: var(--red); color: white; }
  .btn-red:hover:not(:disabled) { background: #dc2626; }
  .btn-orange { background: var(--orange); color: white; }
  .btn-orange:hover:not(:disabled) { background: #d97706; }
  .btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
  .btn-ghost:hover:not(:disabled) { color: var(--text); border-color: var(--text-muted); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-block { width: 100%; }
  .btn-group { display: flex; gap: 6px; flex-wrap: wrap; }

  /* Log */
  .log-container {
    background: #0d1117;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    height: 300px;
    overflow-y: auto;
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    font-size: 12px;
    line-height: 1.6;
  }
  .log-entry { display: flex; gap: 8px; padding: 1px 0; }
  .log-time { color: #6b7280; flex-shrink: 0; }
  .log-tag { flex-shrink: 0; font-weight: 600; min-width: 60px; }
  .log-tag.info { color: var(--accent); }
  .log-tag.success { color: var(--green); }
  .log-tag.warn { color: var(--orange); }
  .log-tag.error { color: var(--red); }
  .log-tag.event { color: var(--purple); }
  .log-msg { color: var(--text); word-break: break-all; }

  /* Connection List */
  .conn-list {
    max-height: 400px;
    overflow-y: auto;
  }
  .conn-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 10px;
    border-radius: 6px;
    margin-bottom: 2px;
    font-size: 12px;
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    transition: background 0.15s;
  }
  .conn-item:hover { background: var(--card-hover); }
  .conn-item .conn-id { color: var(--accent); }
  .conn-item .conn-uid { color: var(--text-muted); }
  .conn-item .conn-stats { color: var(--text-muted); font-size: 11px; }
  .conn-item .conn-status { width: 6px; height: 6px; border-radius: 50%; margin-right: 8px; flex-shrink: 0; }
  .conn-status.connected { background: var(--green); }
  .conn-status.disconnected { background: var(--red); }

  /* Tabs */
  .tabs { display: flex; gap: 2px; margin-bottom: 12px; }
  .tab {
    padding: 6px 16px;
    background: transparent;
    border: 1px solid var(--border);
    border-bottom: none;
    border-radius: 6px 6px 0 0;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
  }
  .tab.active { background: var(--card); color: var(--text); border-color: var(--accent); }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* Chart */
  .chart-container {
    background: #0d1117;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    height: 200px;
    position: relative;
  }
  canvas { width: 100%; height: 100%; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

  /* Toggle */
  .toggle-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .toggle-row label { font-size: 12px; color: var(--text-muted); }

  /* Badge */
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 600;
  }
  .badge-green { background: var(--green-bg); color: var(--green); }
  .badge-red { background: var(--red-bg); color: var(--red); }
  .badge-blue { background: #1e3a5f; color: var(--accent); }

  /* Preset buttons */
  .preset-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-top: 8px; }
  .preset-btn {
    padding: 8px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    cursor: pointer;
    font-size: 12px;
    font-family: inherit;
    text-align: center;
    transition: all 0.15s;
  }
  .preset-btn:hover { border-color: var(--accent); background: var(--card-hover); }
  .preset-btn .preset-num { font-size: 18px; font-weight: 700; display: block; }
  .preset-btn .preset-label { font-size: 10px; color: var(--text-muted); }
</style>
</head>
<body>
<div class="app">
  <!-- Header -->
  <div class="header">
    <h1>MMO Gate <span>压力测试客户端</span></h1>
    <div class="header-status">
      <span><span class="status-dot" id="wsStatus">offline</span>WebSocket</span>
      <span>活跃连接: <strong id="hdrActive">0</strong></span>
      <span>发送: <strong id="hdrSent">0</strong></span>
      <span>接收: <strong id="hdrRecv">0</strong></span>
    </div>
  </div>

  <div class="main">
    <!-- Sidebar -->
    <div class="sidebar">
      <!-- Connection Settings -->
      <div class="card">
        <div class="card-title">🔗 网关连接</div>
        <div class="form-row">
          <div class="form-group">
            <label>Host</label>
            <input type="text" id="gwHost" value="127.0.0.1">
          </div>
          <div class="form-group">
            <label>Port</label>
            <input type="number" id="gwPort" value="7888">
          </div>
        </div>
        <div class="form-group">
          <label>Token (≥8字符)</label>
          <input type="text" id="token" value="test_token_123">
        </div>
        <div class="form-group">
          <label>起始 UID</label>
          <input type="number" id="uidStart" value="10001">
        </div>
      </div>

      <!-- Connect Controls -->
      <div class="card">
        <div class="card-title">⚡ 批量连接</div>
        <div class="preset-grid">
          <button class="preset-btn" onclick="setCount(10)"><span class="preset-num">10</span><span class="preset-label">连接</span></button>
          <button class="preset-btn" onclick="setCount(50)"><span class="preset-num">50</span><span class="preset-label">连接</span></button>
          <button class="preset-btn" onclick="setCount(100)"><span class="preset-num">100</span><span class="preset-label">连接</span></button>
          <button class="preset-btn" onclick="setCount(500)"><span class="preset-num">500</span><span class="preset-label">连接</span></button>
          <button class="preset-btn" onclick="setCount(1000)"><span class="preset-num">1K</span><span class="preset-label">连接</span></button>
          <button class="preset-btn" onclick="setCount(5000)"><span class="preset-num">5K</span><span class="preset-label">连接</span></button>
        </div>
        <div class="form-group" style="margin-top:10px">
          <label>连接数量</label>
          <input type="number" id="connectCount" value="10" min="1" max="10000">
        </div>
        <div class="form-group">
          <label>每连接间隔 (ms, 0=不限速)</label>
          <input type="number" id="connectDelay" value="0" min="0">
        </div>
        <button class="btn btn-green btn-block" id="btnConnect" onclick="doConnect()">⚡ 批量连接</button>
        <div class="btn-group" style="margin-top:6px">
          <button class="btn btn-primary btn-sm" style="flex:1" onclick="doConnectOne()">连接单个</button>
          <button class="btn btn-red btn-sm" style="flex:1" onclick="disconnectAll()">全部断开</button>
        </div>
      </div>

      <!-- Message Simulator -->
      <div class="card">
        <div class="card-title">📨 消息模拟</div>
        <div class="form-group">
          <label>消息类型</label>
          <select id="msgType">
            <option value="1">普通消息 (msg_id=1)</option>
            <option value="100">聊天消息 (msg_id=100)</option>
            <option value="500">系统通知 (msg_id=500)</option>
            <option value="1001" selected>战斗指令 (msg_id=1001)</option>
            <option value="1002">技能释放 (msg_id=1002)</option>
            <option value="1003">移动同步 (msg_id=1003)</option>
            <option value="2001">心跳包 (msg_id=2001)</option>
          </select>
        </div>
        <div class="form-group">
          <label>消息内容</label>
          <textarea id="msgData" rows="2" placeholder="输入消息内容">battle_action:attack</textarea>
        </div>
        <div class="btn-group">
          <button class="btn btn-primary btn-sm" style="flex:1" onclick="sendBroadcast()">广播所有</button>
          <button class="btn btn-ghost btn-sm" style="flex:1" onclick="sendFirst()">发送首个</button>
        </div>
      </div>

      <!-- Auto Send -->
      <div class="card">
        <div class="card-title">🔄 自动发送</div>
        <div class="form-row">
          <div class="form-group">
            <label>间隔 (ms)</label>
            <input type="number" id="autoInterval" value="1000" min="10">
          </div>
          <div class="form-group">
            <label>消息类型</label>
            <select id="autoMsgType">
              <option value="1">普通</option>
              <option value="100">聊天</option>
              <option value="1001" selected>战斗</option>
              <option value="2001">心跳</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>自动发送内容</label>
          <input type="text" id="autoMsgData" value="auto_ping">
        </div>
        <div class="btn-group">
          <button class="btn btn-orange btn-sm" style="flex:1" id="btnAutoStart" onclick="autoSendStart()">启动自动发送</button>
          <button class="btn btn-ghost btn-sm" style="flex:1" onclick="autoSendStop()">停止</button>
        </div>
      </div>

      <!-- Quick Actions -->
      <div class="card">
        <div class="card-title">🛠 快捷操作</div>
        <div class="btn-group">
          <button class="btn btn-ghost btn-sm" style="flex:1" onclick="clearLogs()">清空日志</button>
          <button class="btn btn-ghost btn-sm" style="flex:1" onclick="exportStats()">导出统计</button>
        </div>
      </div>
    </div>

    <!-- Content -->
    <div class="content">
      <!-- Stats -->
      <div class="stats-grid">
        <div class="stat-card stat-green">
          <div class="label">活跃连接</div>
          <div class="value" id="statActive">0</div>
          <div class="sub" id="statTotal">总计 0</div>
        </div>
        <div class="stat-card stat-blue">
          <div class="label">已发送</div>
          <div class="value" id="statSent">0</div>
          <div class="sub" id="statSendRate">0/s</div>
        </div>
        <div class="stat-card stat-purple">
          <div class="label">已接收</div>
          <div class="value" id="statRecv">0</div>
          <div class="sub" id="statRecvRate">0/s</div>
        </div>
        <div class="stat-card stat-orange">
          <div class="label">错误数</div>
          <div class="value" id="statErrors">0</div>
          <div class="sub" id="statErrRate">0/s</div>
        </div>
        <div class="stat-card stat-red">
          <div class="label">失败连接</div>
          <div class="value" id="statFailed">0</div>
          <div class="sub" id="statFailRate">失败率 0%</div>
        </div>
      </div>

      <!-- Chart -->
      <div class="card">
        <div class="card-title">📊 实时吞吐量</div>
        <div class="chart-container">
          <canvas id="chart"></canvas>
        </div>
      </div>

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab active" onclick="switchTab('connections')">连接列表</button>
        <button class="tab" onclick="switchTab('events')">事件日志</button>
        <button class="tab" onclick="switchTab('messages')">消息日志</button>
      </div>

      <div class="tab-content active" id="tab-connections">
        <div class="card">
          <div class="card-title">
            连接列表
            <span class="badge badge-green" id="connCount">0</span>
          </div>
          <div class="conn-list" id="connList">
            <div style="text-align:center; color:var(--text-muted); padding:20px">暂无连接</div>
          </div>
        </div>
      </div>

      <div class="tab-content" id="tab-events">
        <div class="card">
          <div class="card-title">
            事件日志
            <button class="btn btn-ghost btn-sm" onclick="clearEventLog()" style="margin-left:auto">清空</button>
          </div>
          <div class="log-container" id="eventLog"></div>
        </div>
      </div>

      <div class="tab-content" id="tab-messages">
        <div class="card">
          <div class="card-title">
            消息日志
            <button class="btn btn-ghost btn-sm" onclick="clearMsgLog()" style="margin-left:auto">清空</button>
          </div>
          <div class="log-container" id="msgLog"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────
let ws = null;
let stats = { activeConnections: 0, totalConnections: 0, totalSent: 0, totalReceived: 0, totalErrors: 0 };
let prevSent = 0, prevRecv = 0, prevErrors = 0;
let sendRate = 0, recvRate = 0, errRate = 0;
let failedConnections = 0;
let connections = {}; // id -> {uid, connected, msgsSent, msgsReceived}
let autoSendActive = false;
let chartData = []; // {time, sent, recv}
const MAX_LOG = 500;

// ── WebSocket ──────────────────────────────────────────
function connectWS() {
  const proto = location.protocol === "https:" ? "wss:" : "ws:";
  ws = new WebSocket(`${proto}//${location.host}/ws`);

  ws.onopen = () => {
    document.getElementById("wsStatus").className = "status-dot online";
    logEvent("info", "WebSocket 已连接到代理服务器");
  };

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    handleMessage(msg);
  };

  ws.onclose = () => {
    document.getElementById("wsStatus").className = "status-dot offline";
    logEvent("warn", "WebSocket 断开，3秒后重连...");
    setTimeout(connectWS, 3000);
  };

  ws.onerror = () => {};
}

function sendAction(obj) {
  if (ws && ws.readyState === 1) {
    ws.send(JSON.stringify(obj));
  }
}

// ── Message Handler ────────────────────────────────────
function handleMessage(msg) {
  switch (msg.event) {
    case "ready":
      if (msg.config) {
        document.getElementById("gwHost").value = msg.config.gatewayHost;
        document.getElementById("gwPort").value = msg.config.gatewayPort;
      }
      logEvent("success", `代理就绪，网关: ${msg.config.gatewayHost}:${msg.config.gatewayPort}`);
      break;

    case "connected":
      connections[msg.id] = { uid: msg.uid, connected: true, msgsSent: 1, msgsReceived: 0 };
      logEvent("success", `连接成功: ${msg.id} (uid=${msg.uid})`);
      break;

    case "connectFailed":
      failedConnections++;
      document.getElementById("statFailed").textContent = failedConnections;
      logEvent("error", `连接失败: ${msg.id} - ${msg.reason}`);
      break;

    case "disconnected":
      if (connections[msg.id]) connections[msg.id].connected = false;
      logEvent("warn", `断开: ${msg.id} - ${msg.reason}`);
      break;

    case "message":
      if (connections[msg.id]) connections[msg.id].msgsReceived++;
      logMessage(msg.id, msg.msgId, msg.data);
      break;

    case "error":
      logEvent("error", `[${msg.id}] ${msg.message}`);
      break;

    case "stats":
      const sentDelta = msg.totalSent - prevSent;
      const recvDelta = msg.totalReceived - prevRecv;
      const errDelta = msg.totalErrors - prevErrors;
      sendRate = sentDelta;
      recvRate = recvDelta;
      errRate = errDelta;
      prevSent = msg.totalSent;
      prevRecv = msg.totalReceived;
      prevErrors = msg.totalErrors;
      stats = msg;

      updateStats();
      // Update chart
      const now = Date.now();
      chartData.push({ time: now, sent: sendRate, recv: recvRate });
      if (chartData.length > 60) chartData.shift();
      drawChart();
      break;

    case "bulkProgress":
      document.getElementById("btnConnect").textContent = `连接中... ${msg.success + msg.failed}/${msg.total}`;
      document.getElementById("btnConnect").disabled = true;
      break;

    case "bulkDone":
      document.getElementById("btnConnect").textContent = "⚡ 批量连接";
      document.getElementById("btnConnect").disabled = false;
      logEvent("success", `批量连接完成: 成功 ${msg.success}, 失败 ${msg.failed}`);
      break;

    case "autoSendStarted":
      autoSendActive = true;
      document.getElementById("btnAutoStart").textContent = "运行中...";
      logEvent("info", `自动发送已启动`);
      break;

    case "autoSendStopped":
      autoSendActive = false;
      document.getElementById("btnAutoStart").textContent = "启动自动发送";
      logEvent("info", `自动发送已停止`);
      break;

    case "allDisconnected":
      logEvent("info", "所有连接已断开");
      break;
  }
  updateConnList();
}

// ── Stats Update ───────────────────────────────────────
function updateStats() {
  document.getElementById("statActive").textContent = stats.activeConnections || 0;
  document.getElementById("statTotal").textContent = `总计 ${stats.totalConnections || 0}`;
  document.getElementById("statSent").textContent = stats.totalSent || 0;
  document.getElementById("statRecv").textContent = stats.totalReceived || 0;
  document.getElementById("statErrors").textContent = stats.totalErrors || 0;
  document.getElementById("statSendRate").textContent = `${sendRate}/s`;
  document.getElementById("statRecvRate").textContent = `${recvRate}/s`;
  document.getElementById("statErrRate").textContent = `${errRate}/s`;

  const total = stats.totalConnections || 0;
  const failRate = total > 0 ? ((failedConnections / (total + failedConnections)) * 100).toFixed(1) : 0;
  document.getElementById("statFailRate").textContent = `失败率 ${failRate}%`;

  // Header
  document.getElementById("hdrActive").textContent = stats.activeConnections || 0;
  document.getElementById("hdrSent").textContent = stats.totalSent || 0;
  document.getElementById("hdrRecv").textContent = stats.totalReceived || 0;
}

// ── Connection List ────────────────────────────────────
function updateConnList() {
  const list = document.getElementById("connList");
  const ids = Object.keys(connections);
  document.getElementById("connCount").textContent = ids.length;

  if (ids.length === 0) {
    list.innerHTML = '<div style="text-align:center; color:var(--text-muted); padding:20px">暂无连接</div>';
    return;
  }

  // Show latest 200
  const shown = ids.slice(-200);
  list.innerHTML = shown.map(id => {
    const c = connections[id];
    return `<div class="conn-item">
      <span class="conn-status ${c.connected ? "connected" : "disconnected"}"></span>
      <span class="conn-id">${id}</span>
      <span class="conn-uid">uid=${c.uid}</span>
      <span class="conn-stats">↑${c.msgsSent} ↓${c.msgsReceived}</span>
      <button class="btn btn-red btn-sm" onclick="disconnectOne('${id}')" style="padding:2px 8px">断开</button>
    </div>`;
  }).join("");
  list.scrollTop = list.scrollHeight;
}

// ── Actions ────────────────────────────────────────────
function setCount(n) {
  document.getElementById("connectCount").value = n;
}

function doConnect() {
  const count = parseInt(document.getElementById("connectCount").value) || 10;
  const uidStart = parseInt(document.getElementById("uidStart").value) || 10001;
  const token = document.getElementById("token").value || "test_token_123";
  const host = document.getElementById("gwHost").value || "127.0.0.1";
  const port = parseInt(document.getElementById("gwPort").value) || 7888;
  const delayMs = parseInt(document.getElementById("connectDelay").value) || 0;

  sendAction({
    action: "connectBulk",
    count, uidStart, token, host, port, delayMs
  });
  logEvent("info", `开始批量连接: ${count} 个, UID ${uidStart}~${uidStart + count - 1}`);
}

function doConnectOne() {
  const uidStart = parseInt(document.getElementById("uidStart").value) || 10001;
  const token = document.getElementById("token").value || "test_token_123";
  const host = document.getElementById("gwHost").value || "127.0.0.1";
  const port = parseInt(document.getElementById("gwPort").value) || 7888;

  sendAction({
    action: "connect",
    uid: uidStart,
    token, host, port
  });
  // Increment UID for next
  document.getElementById("uidStart").value = uidStart + 1;
}

function disconnectAll() {
  sendAction({ action: "disconnectAll" });
}

function disconnectOne(id) {
  sendAction({ action: "disconnect", id });
}

function sendBroadcast() {
  const msgId = parseInt(document.getElementById("msgType").value);
  const data = document.getElementById("msgData").value || "ping";
  sendAction({ action: "broadcast", msgId, data });
}

function sendFirst() {
  const ids = Object.keys(connections).filter(id => connections[id].connected);
  if (ids.length === 0) {
    logEvent("warn", "没有活跃连接");
    return;
  }
  const msgId = parseInt(document.getElementById("msgType").value);
  const data = document.getElementById("msgData").value || "ping";
  sendAction({ action: "send", id: ids[0], msgId, data });
}

function autoSendStart() {
  if (autoSendActive) {
    autoSendStop();
    return;
  }
  const intervalMs = parseInt(document.getElementById("autoInterval").value) || 1000;
  const msgId = parseInt(document.getElementById("autoMsgType").value);
  const data = document.getElementById("autoMsgData").value || "auto_ping";
  sendAction({ action: "autoSend", intervalMs, msgId, data });
}

function autoSendStop() {
  sendAction({ action: "stopAutoSend" });
}

// ── Tabs ───────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));
  event.target.classList.add("active");
  document.getElementById(`tab-${name}`).classList.add("active");
}

// ── Logging ────────────────────────────────────────────
function fmtTime() {
  const d = new Date();
  return d.toTimeString().slice(0, 8) + "." + String(d.getMilliseconds()).padStart(3, "0");
}

function logEvent(tag, msg) {
  const log = document.getElementById("eventLog");
  const entry = document.createElement("div");
  entry.className = "log-entry";
  entry.innerHTML = `<span class="log-time">${fmtTime()}</span><span class="log-tag ${tag}">[${tag.toUpperCase()}]</span><span class="log-msg">${escapeHtml(msg)}</span>`;
  log.appendChild(entry);
  if (log.children.length > MAX_LOG) log.removeChild(log.firstChild);
  log.scrollTop = log.scrollHeight;
}

function logMessage(connId, msgId, data) {
  const log = document.getElementById("msgLog");
  const entry = document.createElement("div");
  entry.className = "log-entry";
  const preview = data.length > 100 ? data.substring(0, 100) + "..." : data;
  entry.innerHTML = `<span class="log-time">${fmtTime()}</span><span class="log-tag event">[MSG]</span><span class="log-msg">[${connId}] id=${msgId} data=${escapeHtml(preview)}</span>`;
  log.appendChild(entry);
  if (log.children.length > MAX_LOG) log.removeChild(log.firstChild);
  log.scrollTop = log.scrollHeight;
}

function clearEventLog() {
  document.getElementById("eventLog").innerHTML = "";
}

function clearMsgLog() {
  document.getElementById("msgLog").innerHTML = "";
}

function clearLogs() {
  clearEventLog();
  clearMsgLog();
}

function exportStats() {
  const data = {
    timestamp: new Date().toISOString(),
    stats: stats,
    sendRate: sendRate + "/s",
    recvRate: recvRate + "/s",
    failedConnections,
    connections: Object.keys(connections).map(id => ({ id, ...connections[id] })),
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `gate-stats-${Date.now()}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function escapeHtml(s) {
  return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

// ── Chart ──────────────────────────────────────────────
const canvas = document.getElementById("chart");
const ctx = canvas.getContext("2d");

function drawChart() {
  const w = canvas.width = canvas.offsetWidth * window.devicePixelRatio;
  const h = canvas.height = canvas.offsetHeight * window.devicePixelRatio;
  ctx.scale(1, 1);

  // Background
  ctx.fillStyle = "#0d1117";
  ctx.fillRect(0, 0, w, h);

  if (chartData.length < 2) {
    ctx.fillStyle = "#6b7280";
    ctx.font = "14px sans-serif";
    ctx.textAlign = "center";
    ctx.fillText("等待数据...", w / 2, h / 2);
    return;
  }

  // Grid
  ctx.strokeStyle = "#1e293b";
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = (h / 4) * i;
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(w, y);
    ctx.stroke();
  }

  // Find max
  let maxVal = 1;
  for (const d of chartData) {
    maxVal = Math.max(maxVal, d.sent, d.recv);
  }
  maxVal = Math.ceil(maxVal * 1.1);

  // Draw sent line (blue)
  ctx.strokeStyle = "#3b82f6";
  ctx.lineWidth = 2 * window.devicePixelRatio;
  ctx.beginPath();
  chartData.forEach((d, i) => {
    const x = (w / (chartData.length - 1)) * i;
    const y = h - (d.sent / maxVal) * h;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  });
  ctx.stroke();

  // Draw recv line (purple)
  ctx.strokeStyle = "#8b5cf6";
  ctx.lineWidth = 2 * window.devicePixelRatio;
  ctx.beginPath();
  chartData.forEach((d, i) => {
    const x = (w / (chartData.length - 1)) * i;
    const y = h - (d.recv / maxVal) * h;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  });
  ctx.stroke();

  // Legend
  ctx.font = "12px sans-serif";
  ctx.textAlign = "left";
  ctx.fillStyle = "#3b82f6";
  ctx.fillText("● 发送", 8, 16);
  ctx.fillStyle = "#8b5cf6";
  ctx.fillText("● 接收", 60, 16);
  ctx.fillStyle = "#6b7280";
  ctx.textAlign = "right";
  ctx.fillText(`max: ${maxVal}/s`, w - 8, 16);
}

// ── Init ───────────────────────────────────────────────
connectWS();
drawChart();
logEvent("info", "网页客户端已加载，正在连接代理服务器...");
logEvent("info", "提示: 打开多个浏览器标签页可以创建更多连接！");
</script>
