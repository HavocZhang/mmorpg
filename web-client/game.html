<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8"><title>Rust MMO</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#0a0a1a;font:13px sans-serif;overflow:hidden;color:#ccc}#app{display:flex;height:100vh;flex-direction:column}
#top{background:#1a1a2e;padding:4px 14px;display:flex;gap:16px;font-size:12px;border-bottom:1px solid #333;align-items:center}
#top .v{color:#fff;font-weight:bold}#top .l{color:#777}
#main{display:flex;flex:1;overflow:hidden}#wrap{flex:1;position:relative;background:#0d0d20}
canvas{display:block}#status{position:absolute;top:8px;left:8px;font-size:11px;padding:3px 8px;border-radius:4px;background:rgba(0,0,0,.7);font-family:monospace}
.dmg{position:absolute;font-size:16px;font-weight:bold;pointer-events:none;animation:up .8s ease-out forwards;z-index:5}@keyframes up{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-30px)}}
#side{width:260px;background:#12122a;border-left:1px solid #333;display:flex;flex-direction:column;overflow-y:auto}
.p{padding:8px 10px;border-bottom:1px solid #222}.p h3{margin-bottom:4px;font-size:12px;color:#888}.bar{height:5px;background:#333;border-radius:3px;margin:2px 0}.bar div{height:100%;border-radius:3px;transition:width .3s}.hp div{background:#e74c3c}.mp div{background:#3498db}.xp div{background:#f39c12}
.item{display:flex;gap:6px;padding:3px 0;border-bottom:1px solid #1a1a33;font-size:11px;align-items:center}.item:hover{background:#1a1a44}.abtn{padding:1px 5px;background:#222;border-radius:3px;font-size:10px;cursor:pointer;margin-left:4px;color:#aaa}.abtn:hover{color:#fff;background:#444}
#chat{flex:1;overflow-y:auto;padding:6px;font-size:11px;min-height:0;line-height:1.5}#cin{width:100%;padding:5px 8px;background:#1a1a33;border:1px solid #333;color:#fff;font-size:12px;outline:0}
#bot{background:#1a1a2e;padding:4px 12px;display:flex;gap:6px;align-items:center;border-top:1px solid #333}
.sk{width:34px;height:34px;border:1px solid #555;border-radius:4px;text-align:center;line-height:33px;font-size:15px;background:#1a1a33;cursor:pointer;position:relative}.sk:hover{background:#2a2a55}#pt{color:#f39c12;font-size:11px;margin-left:8px}
#dlg{display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:#1a1a3e;border:2px solid #555;border-radius:8px;padding:16px 20px;min-width:300px;z-index:100;box-shadow:0 0 20px rgba(0,0,0,.5)}#dlg h2{color:#f39c12;font-size:14px;margin-bottom:8px}#dlg p{color:#ccc;font-size:12px;margin:4px 0;line-height:1.4}#dlg button{margin:6px 6px 0 0;padding:5px 14px;cursor:pointer;background:#333;color:#fff;border:1px solid #555;border-radius:4px;font-size:12px}#dlg button:hover{background:#555}#dlg button.ok{background:#27ae60;border-color:#27ae60}#dlg .q{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #222}#dlg .q span{color:#aaa}</style></head><body>
<div id="app"><div id="top"><span>🟢<b class="v" id="ol">0</b></span><span>👤<b class="v" id="nm">-</b></span><span>Lv<b class="v" id="lv">1</b></span><span>⚔<b class="v" id="at">10</b></span><span>🛡<b class="v" id="df">5</b></span><span id="pt"></span><span style="margin-left:auto;font-size:11px;color:#666">WASD 移动 | 1 普攻 | 2-5 技能 | QE 药水 | F NPC | G 拾取 | Enter 聊天 | T 组队</span></div>
<div id="main"><div id="wrap"><canvas id="c"></canvas><div id="status">连接中...</div></div>
<div id="side"><div class="p"><h3>角色</h3>HP<div class="bar hp"><div id="hpb" style="width:100%"></div></div><span id="hpt">100/100</span>
  MP<div class="bar mp"><div id="mpb" style="width:100%"></div></div><span id="mpt">50/50</span>
  XP<div class="bar xp"><div id="xpb" style="width:0%"></div></div><span id="xpt">0/100</span>
  <div style="margin-top:4px;font-size:11px">装备: <span id="eq">—</span></div></div>
<div class="p"><h3>🎒背包</h3><div id="inv"></div></div>
<div class="p"><h3>📜任务</h3><div id="qst"></div></div>
<div class="p"><h3>💬聊天</h3><div id="chat"></div><input id="cin" placeholder="Enter..."></div></div></div>
<div id="bot"><span style="font-size:10px;color:#777">技能:</span><div class="sk" onclick="k(1)">⚔</div><div class="sk" onclick="k(2)">💥</div><div class="sk" onclick="k(3)">🔥</div><div class="sk" onclick="k(4)">❄</div><div class="sk" onclick="k(5)">💚</div><span style="margin:0 8px;color:#555">|</span><span style="font-size:10px;color:#777">药水:</span><div class="sk" onclick="it(6,6)">🧪</div><div class="sk" onclick="it(7,7)">💧</div></div>
<div id="dlg"><h2 id="dt"></h2><p id="dc"></p><div id="dq"></div><div id="da"></div></div></div>
<script>
// ====== Crypto SDK ======
const M=[0x4D,0x4D],V=1,H=16,K='00112233445566778899aabbccddeeff00112233445566778899aabbccddeeff',W='ws://127.0.0.1:9000';
const CT=(()=>{const t=new Uint32Array(256);for(let i=0;i<256;i++){let c=i;for(let j=0;j<8;j++)c=c&1?0xedb88320^(c>>>1):c>>>1;t[i]=c>>>0}return t})();
const C=b=>{let c=0xffffffff;for(let i=0;i<b.length;i++)c=CT[(c^b[i])&0xff]^(c>>>8);return(c^0xffffffff)>>>0};
let _k=null;
async function ik(){if(!_k){const r=new Uint8Array(K.match(/.{2}/g).map(b=>parseInt(b,16)));_k=await crypto.subtle.importKey('raw',r,{name:'AES-GCM'},false,['encrypt','decrypt'])}}
async function E(p){await ik();const n=crypto.getRandomValues(new Uint8Array(12)),d=typeof p=='string'?new TextEncoder().encode(p):p,e=await crypto.subtle.encrypt({name:'AES-GCM',iv:n},_k,d);const t=new Uint8Array(e,0,e.byteLength-16),g=new Uint8Array(e,e.byteLength-16);const r=new Uint8Array(12+t.length+16);r.set(n,0);r.set(t,12);r.set(g,12+t.length);return r}
async function D(d){await ik();const n=d.subarray(0,12),g=d.subarray(d.length-16),c=d.subarray(12,d.length-16);const x=new Uint8Array(c.length+g.length);x.set(c,0);x.set(g,c.length);return new Uint8Array(await crypto.subtle.decrypt({name:'AES-GCM',iv:n},_k,x))}
async function P(m,pl){const e=await E(pl),h=new Uint8Array(H);h[0]=M[0];h[1]=M[1];h[2]=V;new DataView(h.buffer).setUint16(4,m,false);new DataView(h.buffer).setUint16(6,e.length,false);new DataView(h.buffer).setUint32(8,C(e),false);const r=new Uint8Array(H+e.length);r.set(h,0);r.set(e,H);return r}

// ====== Network ======
let ws,uid,S=async(t)=>{document.getElementById('status').textContent=t};
async function go(uidv){uid=uidv;return new Promise((rv,rj)=>{ws=new WebSocket(W);ws.binaryType='arraybuffer';ws.onopen=async()=>{ws.send(await P(1,JSON.stringify({uid,token:'tok_abcdefgh',version:V,timestamp:Math.floor(Date.now()/1e3)})));rv()};ws.onmessage=e=>onD(new Uint8Array(e.data));ws.onclose=()=>S('断开-刷新重连');ws.onerror=()=>rj(new Error('ws'));setTimeout(()=>rj(new Error('timeout')),5000)})}
async function sd(m,d){if(ws&&ws.readyState===1)ws.send(await P(m,typeof d=='string'?d:JSON.stringify(d)))}

// ====== State ======
let me={lvl:1,hp:100,mh:100,mp:50,mm:50,xp:0,atk:10,def:5,name:'',x:400,y:300,ready:false};
let ents={},inv=[],eq={},qst=[],sel=0,keys={},vx=0,vy=0,parties={},cd={},drops={};
const IC={1:'🟢',2:'🔵',3:'💀',4:'🟣',5:'🟤'};
// 物品数据层(与 logic_server ItemDef 同步)
const IT={1:{n:'铁剑',t:'weapon',i:'🗡',atk:15,def:0,hp:0,mp:0,g:100,d:'+15攻击'},2:{n:'钢剑',t:'weapon',i:'⚔',atk:30,def:0,hp:0,mp:0,g:300,d:'+30攻击'},3:{n:'皮甲',t:'armor',i:'🛡',atk:0,def:10,hp:0,mp:0,g:150,d:'+10防御'},4:{n:'铁甲',t:'armor',i:'🛡',atk:0,def:25,hp:0,mp:0,g:400,d:'+25防御'},5:{n:'力量戒指',t:'accessory',i:'💍',atk:10,def:5,hp:0,mp:0,g:200,d:'+10攻+5防'},6:{n:'生命药水',t:'potion',i:'🧪',atk:0,def:0,hp:50,mp:0,g:50,d:'恢复50HP'},7:{n:'法力药水',t:'potion',i:'💧',atk:0,def:0,hp:0,mp:30,g:50,d:'恢复30MP'},8:{n:'全恢复药水',t:'potion',i:'💎',atk:0,def:0,hp:100,mp:50,g:150,d:'恢复100HP+50MP'},9:{n:'史莱姆凝胶',t:'material',i:'🟢',atk:0,def:0,hp:0,mp:0,g:10,d:'材料'},10:{n:'哥布林耳朵',t:'material',i:'👂',atk:0,def:0,hp:0,mp:0,g:15,d:'材料'}};
function GI(id){return IT[id]||{n:'物品'+id,i:'📦',t:'unknown',atk:0,def:0,hp:0,mp:0,g:0,d:'?'}}
function EQ_BONUS(){let a=0,d=0;['weapon','armor','accessory'].forEach(s=>{const it=eq[s];if(it&&it.itemId){const di=GI(it.itemId);a+=di.atk;d+=di.def}});return{atk:a,def:d}}

// ====== Message Dispatch ======
async function onD(data){let off=0;while(off+H<=data.length){if(data[off]!==M[0]||data[off+1]!==M[1]){off++;continue}const v=new DataView(data.buffer,data.byteOffset,data.byteLength);const bl=v.getUint16(off+6,false);if(off+H+bl>data.length)break;const mid=v.getUint16(off+4,false);try{const p=await D(data.subarray(off+H,off+H+bl));const j=JSON.parse(new TextDecoder().decode(p));h(mid,j)}catch(e){}off+=H+bl}}
function h(m,b){switch(m){
case 5001:me.hp=b.hp??me.hp;me.mh=b.maxHp??me.mh;me.mp=b.mp??me.mp;me.mm=b.maxMp??me.mm;if(b.level){me.lvl=b.level;me.xp=b.exp||0;me.atk=b.atk||me.atk;me.def=b.def||me.def;me.name=b.name||me.name;me.x=b.x||me.x;me.y=b.y||me.y;if(!me.ready){me.ready=true;S("就绪")}}R();break;
case 5002:if(b.gained!=null){if(b.exp!=null)me.xp=b.exp;if(b.level&&b.level>me.lvl){me.lvl=b.level;L('⭐','升到 '+me.lvl+'级!')}R()}else if(b.mp!=null){me.mp=b.mp;me.mm=b.maxMp||me.mm;R()}break;
case 5003:inv=b.items||[];R();break;
case 5004:eq=b;R();break;
case 5005:qst=b.quests||[];R();break;
case 5006:{if(b.name)L('💬','NPC: '+b.name+' — '+(b.dialog||''));break}
case 9002:{if(b.npcs)b.npcs.forEach(s=>{const j=JSON.parse(s);ents[j.id]={t:'npc',name:j.name,x:j.x,y:j.y,tx:j.x,ty:j.y,npcType:j.npcType,dialog:j.dialog}});if(b.mobs)b.mobs.forEach(s=>{const j=JSON.parse(s);ents[j.entityId]={t:'mob',name:j.name,x:j.x,y:j.y,tx:j.x,ty:j.y,hp:j.hp,mh:j.maxHp,level:j.level,icon:IC[j.defId]||'👹'}});L('📥','世界加载 '+Object.keys(ents).length+' 实体');break}
case 6001:{if(b.targetUid&&ents[b.targetUid]){const e=ents[b.targetUid];const dmg=b.damage||0;e.hp=Math.max(0,(e.hp||100)-dmg);showDmg(b.targetUid,dmg);if(e.hp<=0){e.hp=0;L('⚔','击败 '+e.name+'!');delete ents[b.targetUid];if(sel===b.targetUid)sel=0}}if(b.playerHp!==undefined){me.hp=b.playerHp;R()}if(b.expGained){me.xp+=b.expGained;R()}break}
case 6003:{if(b.drops)b.drops.forEach(s=>{try{const d=typeof s==='string'?JSON.parse(s):s;drops[d.dropId]={dropId:d.dropId,itemId:d.itemId,count:d.count||1,x:d.x,y:d.y};L('💠','掉落: '+GI(d.itemId).n+' (按G拾取)')}catch(x){}});if(b.exp)me.xp+=b.exp;break}
case 7002:{const tp=b.type||'';if(tp==='party_invite'){L('🤝',b.fromName+' 邀请你组队! 按 T 接受')}else if(tp==='party_join'){parties[b.uid]=b.name;L('🤝',b.name+' 加入队伍');up()}else if(tp==='party_leave'){delete parties[b.uid];L('🤝',b.name+' 离开队伍');up()}else L(b.fromName||('P'+b.from),b.text||'');break}
case 8001:if(b.uid&&ents[b.uid]){ents[b.uid].tx=b.x;ents[b.uid].ty=b.y}break;
case 8002:if(b.uid!==uid){ents[b.uid]={t:'player',name:b.name||'P'+b.uid,x:b.x||400,y:b.y||300,tx:b.x||400,ty:b.y||300,hp:100,mh:100};L('📥',(b.name||'P'+b.uid)+' 进入')}break;
case 8003:if(b.uid&&ents[b.uid]){L('📤',ents[b.uid].name+' 离开');delete ents[b.uid]}break;
case 8004:if(b.entityId&&ents[b.entityId]){ents[b.entityId].tx=b.x;ents[b.entityId].ty=b.y;ents[b.entityId].hp=b.hp;ents[b.entityId].mh=b.maxHp}break;
case 9001:(b.players||[]).forEach(p=>{if(p.uid!==uid)ents[p.uid]={t:'player',name:p.name||'P'+p.uid,x:p.x||400,y:p.y||300,tx:p.x||400,ty:p.y||300,hp:100,mh:100}});break;
}}function L(w,t){const c=document.getElementById('chat');c.innerHTML+=`<div><b style="color:#3498db">${w}</b>: ${t}</div>`;c.scrollTop=c.scrollHeight}
function showDmg(eid,dmg){const e=ents[eid];if(!e)return;const p=sp(e.x,e.y);const d=document.createElement('div');d.className='dmg';d.textContent=dmg>0?'-'+dmg:'MISS';d.style.color=dmg>0?'#ff4444':'#888';d.style.left=p.x+'px';d.style.top=(p.y-30)+'px';document.getElementById('wrap').appendChild(d);setTimeout(()=>d.remove(),800)}

// ====== HUD ======
function R(){
  document.getElementById('hpb').style.width=(me.hp/me.mh*100)+'%';document.getElementById('hpt').textContent=me.hp+'/'+me.mh;
  document.getElementById('mpb').style.width=(me.mp/me.mm*100)+'%';document.getElementById('mpt').textContent=me.mp+'/'+me.mm;
  document.getElementById('xpb').style.width=(me.xp/(me.lvl*me.lvl*100)*100)+'%';document.getElementById('xpt').textContent=me.xp+'/'+(me.lvl*me.lvl*100);
  document.getElementById('nm').textContent=me.name;document.getElementById('lv').textContent=me.lvl;
  const eb=EQ_BONUS();
  document.getElementById('at').textContent=(me.atk+eb.atk)+' (+'+eb.atk+')';
  document.getElementById('df').textContent=(me.def+eb.def)+' (+'+eb.def+')';
  document.getElementById('ol').textContent=Object.values(ents).filter(e=>e.t==='player').length;
  // 装备面板(3槽)
  const eqHTML=[];
  ['weapon','armor','accessory'].forEach(s=>{
    const item=eq[s],d=item&&item.itemId?GI(item.itemId):{n:'空',i:s==='weapon'?'⚔':s==='armor'?'🛡':'💍',t:'empty',atk:0,def:0,hp:0,mp:0,g:0,d:''};
    const plus=item&&item.itemId?'style="color:#2ecc71"':'style="color:#555"';
    eqHTML.push('<span '+plus+' title="'+s+': '+(item&&item.itemId?d.n+' '+d.d:'空')+'">'+d.i+'</span>');
  });
  document.getElementById('eq').innerHTML=eqHTML.join(' ');
  // 背包
  const im={};inv.forEach(({itemId,count})=>{const c=count||1;im[itemId]=(im[itemId]||0)+c});
  document.getElementById('inv').innerHTML=Object.entries(im).map(([id,c])=>{
    const d=GI(parseInt(id)),acts=[];
    if(d.hp||d.mp)acts.push('<span class="abtn" onclick="us('+id+')" title="使用 '+d.n+'">使用</span>');
    if(d.t==='weapon'||d.t==='armor'||d.t==='accessory')acts.push('<span class="abtn" onclick="eqp('+id+',\''+d.t+'\')" title="装备 '+d.n+'">装备</span>');
    return '<div class="item" title="'+d.n+': '+d.d+'&#10;价值: '+d.g+' 金币"><span>'+d.i+'</span> '+d.n+' <b>x'+c+'</b><span class="a">'+acts.join('')+'</span></div>'}).join('')||'<span style="color:#666;font-size:12px">空空如也 — 去打怪吧!</span>';
  // 任务
  document.getElementById('qst').innerHTML=qst.map(q=>{
    const d=q.name||('任务'+q.questId),t=q.target||1,p=q.progress||0;
    return '<div style="font-size:11px;padding:2px 0">📜 '+d+' ('+p+'/'+t+')<div class="bar"><div style="width:'+Math.min(p/t*100,100)+'%;background:#27ae60"></div></div></div>'}).join('')||'<span style="color:#666;font-size:12px">暂无任务 — 找NPC按F</span>';
}
function up(){document.getElementById('pt').textContent=Object.keys(parties).length>0?'🤝队伍:'+Object.values(parties).join(', '):''}

// ====== Render ======
const cv=document.getElementById('c'),cx=cv.getContext('2d');
function rs(){cv.width=window.innerWidth-260;cv.height=window.innerHeight-70}window.onresize=rs;rs();
function sp(wx,wy){return{x:wx-vx+cv.width/2,y:cv.height/2-(wy-vy)}}
function dr(){
  cx.fillStyle='#0d0d20';cx.fillRect(0,0,cv.width,cv.height);vx+=(me.x-vx)*.25;vy+=(me.y-vy)*.25;
  const g=50;cx.strokeStyle='#141430';cx.lineWidth=1;
  for(let x=(-vx%g+g)%g;x<cv.width;x+=g){cx.beginPath();cx.moveTo(x,0);cx.lineTo(x,cv.height);cx.stroke()}
  for(let y=(vy%g+g)%g;y<cv.height;y+=g){cx.beginPath();cx.moveTo(0,y);cx.lineTo(cv.width,y);cx.stroke()}
  // Entities — lerp toward target
  Object.entries(ents).forEach(([id,e])=>{e.x=(e.tx!=null?e.x+(e.tx-e.x)*.25:e.x);e.y=(e.ty!=null?e.y+(e.ty-e.y)*.25:e.y);const p=sp(e.x,e.y);if(p.x<-60||p.x>cv.width+60||p.y<-60||p.y>cv.height+60)return;
    if(e.t==='mob'){cx.fillStyle='#e74c3c';const s=14;cx.beginPath();cx.arc(p.x,p.y,s,0,Math.PI*2);cx.fill();cx.fillStyle='#fff';cx.font='10px sans-serif';cx.textAlign='center';cx.fillText(e.icon||'👹',p.x,p.y+3);
      if(e.mh>0){cx.fillStyle='#333';cx.fillRect(p.x-18,p.y-s-10,36,5);cx.fillStyle='#e74c3c';cx.fillRect(p.x-18,p.y-s-10,36*((e.hp||100)/e.mh),5)}cx.fillText(e.name,p.x,p.y-s-16)}
    else if(e.t==='npc'){cx.fillStyle='#f39c12';cx.beginPath();cx.arc(p.x,p.y,10,0,Math.PI*2);cx.fill();cx.fillStyle='#fff';cx.font='9px sans-serif';cx.textAlign='center';cx.fillText(e.name,p.x,p.y+18)}
    else if(e.t==='player'){cx.fillStyle=parties[Number(id)]?'#27ae60':'#3498db';cx.beginPath();cx.arc(p.x,p.y,10,0,Math.PI*2);cx.fill();cx.fillStyle='#fff';cx.font='10px sans-serif';cx.textAlign='center';cx.fillText(e.name,p.x,p.y-16)}
  });
  // Drops
  Object.values(drops).forEach(d=>{const p=sp(d.x,d.y);if(p.x<-40||p.x>cv.width+40||p.y<-40||p.y>cv.height+40)return;const dd=GI(d.itemId);cx.fillStyle='#ffd700';cx.font='11px sans-serif';cx.textAlign='center';cx.fillText('💠',p.x,p.y);cx.fillStyle='#fff';cx.font='8px sans-serif';cx.fillText(dd.n,p.x,p.y+10)});
  // Me
  const C=cv.width/2,Y=cv.height/2;cx.fillStyle='#2ecc71';cx.beginPath();cx.arc(C,Y,16,0,Math.PI*2);cx.fill();cx.strokeStyle='#fff';cx.lineWidth=3;cx.beginPath();cx.arc(C,Y,16,0,Math.PI*2);cx.stroke();cx.font='16px sans-serif';cx.textAlign='center';cx.textBaseline='middle';cx.fillText('🧙',C,Y);cx.font='bold 12px sans-serif';cx.fillStyle='#2ecc71';cx.fillText(me.name||'你',C,Y-28);
  if(me.mh>0){cx.fillStyle='#333';cx.fillRect(C-22,Y+22,44,5);cx.fillStyle='#e74c3c';cx.fillRect(C-22,Y+22,44*(me.hp/me.mh),5)}
  if(sel&&ents[sel]){const s=sp(ents[sel].x,ents[sel].y);cx.strokeStyle='#0ff';cx.lineWidth=2;cx.beginPath();cx.arc(s.x,s.y,18,0,Math.PI*2);cx.stroke()}
  requestAnimationFrame(dr)
}

// ====== Input ======
document.addEventListener('keydown',e=>{const ck=e.code,ky=e.key.toLowerCase();
  if(['KeyW','KeyA','KeyS','KeyD','ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Digit1','Digit2','Digit3','Digit4','Digit5','KeyQ','KeyE','KeyF','KeyG','KeyT'].includes(c))e.preventDefault();
  keys[ky]=true;
  if(ky==='enter'&&document.activeElement!==document.getElementById('cin')){document.getElementById('cin').focus();e.preventDefault()}
  if(ky==='1'||c==='Digit1')k(1);else if(ky==='2'||c==='Digit2')k(2);
  else if(ky==='3'||c==='Digit3')k(3);else if(ky==='4'||c==='Digit4')k(4);
  else if(ky==='5'||c==='Digit5')k(5);
  else if(ky==='q')it(6,6);else if(ky==='e')it(7,7);
  else if(ky==='f')talk();else if(ky==='g')pick();
  else if(ky==='t')acpt();
});
document.addEventListener('keyup',e=>{const c=e.code,k=e.key.toLowerCase();if(['KeyW','KeyA','KeyS','KeyD','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(c))e.preventDefault();keys[k]=false});
document.getElementById('cin').addEventListener('keydown',async e=>{if(e.key==='Enter'){const t=document.getElementById('cin').value.trim();if(t){await sd(2001,{from:uid,text:t,channel:'world'});document.getElementById('cin').value=''}}});

// ====== Actions ======
function nm(){let b=null,bd=1e9;Object.entries(ents).forEach(([id,e])=>{if(e.t==='mob'&&e.hp>0){const d=Math.hypot(e.x-me.x,e.y-me.y);if(d<bd){bd=d;b=Number(id)}}});return b}
async function k(sid){if(inDlg)return;if(cd[sid]&&cd[sid]>Date.now()){L('⏳','技能冷却中 ('+Math.ceil((cd[sid]-Date.now())/1000)+'s)');return}const t=sid===1?nm():sel;if(!t||!ents[t]){L('⚠',sid===1?'附近没有怪物':'没有选中目标 — 先按1锁定怪物再按2-5');return}sel=t;cd[sid]=Date.now()+(sid===1?800:2000);L('⚔','攻击 '+ents[t].name+'!');await sd(sid===1?1001:1002,sid===1?{skillId:1,targetUid:t}:{skillId:sid,targetUid:t})}
async function it(a,b){const h=inv.find(i=>i.itemId===a||i.itemId===b);if(h)await sd(1008,{itemId:h.itemId});else L("⚠","背包中没有该药水!")}
async function us(id){await sd(1008,{itemId:id})}
async function eqp(id,type){const iid=parseInt(id);if(isNaN(iid)){L("⚠","无效物品ID");return}const s=type==='weapon'?'weapon':type==='armor'?'armor':'accessory';await sd(1004,{itemId:iid,slot:s});L('⚔','装备 '+GI(parseInt(id)).n+' 到 '+s+'槽')}
let inDlg=false;async function talk(){let b=null,bd=1e9;Object.entries(ents).forEach(([id,e])=>{if(e.t==='npc'){const d=Math.hypot(e.x-me.x,e.y-me.y);if(d<bd){bd=d;b={id:Number(id),e}}}});
if(!b||bd>150){L('💬','附近没有NPC');return}
const e=b.e,dlg=document.getElementById('dlg');
document.getElementById('dt').textContent=e.name;
document.getElementById('dc').textContent=e.dialog||'你好，冒险者！';
document.getElementById('da').innerHTML='<button onclick="cls()">关闭</button>';
// Show available quests
const AQ=[{id:1,name:'史莱姆清理',desc:'消灭3只史莱姆'},{id:2,name:'哥布林威胁',desc:'消灭3只哥布林'}];
document.getElementById('dq').innerHTML=AQ.map(q=>{
  const has=qst.find(s=>s.questId===q.id);
  const done=has&&has.progress>=has.target;
  return `<div class="q"><span>📜 ${q.name} — ${q.desc}</span>${has?(done?`<button class="ok" onclick="sd(1006,{questId:${q.id}});cls()">提交</button>`:`<span style="color:#27ae60">${has.progress}/${has.target}</span>`):`<button onclick="sd(1005,{questId:${q.id}});L('📜','接取任务: ${q.name}');cls()">接取</button>`}</div>`}).join('');
dlg.style.display='block'}
function cls(){document.getElementById('dlg').style.display='none';inDlg=false}
async function pick(){let b=null,bd=1e9;Object.values(drops).forEach(d=>{const dist=Math.hypot(d.x-me.x,d.y-me.y);if(dist<bd&&dist<80){bd=dist;b=d}});if(b){L('💎','拾取 '+GI(b.itemId).n+'!');await sd(1003,{dropId:b.dropId});delete drops[b.dropId]}else L('💎','附近没有掉落物 (按G)')}
async function acpt(){await sd(2003,{})}

// ====== Startup ======
async function main(){
  const u=Math.floor(Math.random()*90000)+10000;S('连接...');await go(u);
  await new Promise(r=>setTimeout(r,2500));S('加载...');dr();
  setInterval(async()=>{if(inDlg)return;let dx=0,dy=0;if(keys['w']||keys['arrowup'])dy+=6;if(keys['s']||keys['arrowdown'])dy-=6;if(keys['a']||keys['arrowleft'])dx-=6;if(keys['d']||keys['arrowright'])dx+=6;if(dx||dy){me.x=Math.max(0,Math.min(1600,me.x+dx));me.y=Math.max(0,Math.min(1200,me.y+dy));sd(3001,{x:me.x,y:me.y,dir:0})}},100);
  setInterval(()=>sd(4001,{}),800);
  L('🎮','WASD移动 1普攻 2-5技能 QE药水 F对话 G拾取 T接受组队 Enter聊天');
  S('就绪');
}main().catch(e=>{S('失败:'+e.message);L('❌',e.message)});
</script></body></html>
