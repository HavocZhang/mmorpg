<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8"><title>Rust MMO v0.4</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#0a0a1a;font:13px sans-serif;overflow:hidden;color:#ccc}#app{display:flex;height:100vh;flex-direction:column}

@keyframes healFloat{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-25px)}}
@keyframes killBoom{0%{opacity:1;transform:scale(0.2)}50%{opacity:0.8;transform:scale(1.5)}100%{opacity:0;transform:scale(2.5)}}
@keyframes dropSpark{0%{opacity:0;transform:translateY(10px) scale(0.5)}50%{opacity:1;transform:translateY(-5px) scale(1.2)}100%{opacity:0.8;transform:translateY(0) scale(1)}}

/* Dialog */

</style></head><body>

<script>
// ====== Crypto SDK ======
const M=[0x4D,0x4D],V=1,H=16,K='00112233445566778899aabbccddeeff00112233445566778899aabbccddeeff',W='ws://127.0.0.1:9000';
const CT=(()=>{const t=new Uint32Array(256);for(let i=0;i<256;i++){let c=i;for(let j=0;j<8;j++)c=c&1?0xedb88320^(c>>>1):c>>>1;t[i]=c>>>0}return t})();
const C=b=>{let c=0xffffffff;for(let i=0;i<b.length;i++)c=CT[(c^b[i])&0xff]^(c>>>8);return(c^0xffffffff)>>>0};
let _k=null;
async function ik(){if(!_k){const r=new Uint8Array(K.match(/.{2}/g).map(b=>parseInt(b,16)));_k=await crypto.subtle.importKey('raw',r,{name:'AES-GCM'},false,['encrypt','decrypt'])}}
async function E(p){await ik();const n=crypto.getRandomValues(new Uint8Array(12)),d=typeof p=='string'?new TextEncoder().encode(p):p,e=await crypto.subtle.encrypt({name:'AES-GCM',iv:n},_k,d);const t=new Uint8Array(e,0,e.byteLength-16),g=new Uint8Array(e,e.byteLength-16);const r=new Uint8Array(12+t.length+16);r.set(n,0);r.set(t,12);r.set(g,12+t.length);return r}
async function D(d){await ik();const n=d.subarray(0,12),g=d.subarray(d.length-16),c=d.subarray(12,d.length-16);const x=new Uint8Array(c.length+g.length);x.set(c,0);x.set(g,c.length);return new Uint8Array(await crypto.subtle.decrypt({name:'AES-GCM',iv:n},_k,x))}
async function P(m,pl){const e=await E(pl),h=new Uint8Array(H);h[0]=M[0];h[1]=M[1];h[2]=V;new DataView(h.buffer).setUint16(4,m,false);new DataView(h.buffer).setUint16(6,e.length,false);new DataView(h.buffer).setUint32(8,C(e),false);const r=new Uint8Array(H+e.length);r.set(h,0);r.set(e,H);return r}

// ====== Network ======
let ws,uid,S=async(t)=>{document.getElementById('status').textContent=t};
async function go(uidv){uid=uidv;return new Promise((rv,rj)=>{ws=new WebSocket(W);ws.binaryType='arraybuffer';ws.onopen=async()=>{ws.send(await P(1,JSON.stringify({uid,token:'tok_abcdefgh',version:V,timestamp:Math.floor(Date.now()/1e3)})));rv()};ws.onmessage=e=>onD(new Uint8Array(e.data));ws.onclose=()=>S('断开-刷新重连');ws.onerror=()=>rj(new Error('ws'));setTimeout(()=>rj(new Error('timeout')),5000)})}
async function sd(m,d){if(ws&&ws.readyState===1)ws.send(await P(m,typeof d=='string'?d:JSON.stringify(d)))}

// ====== State ======
let me={lvl:1,hp:100,mh:100,mp:50,mm:50,xp:0,atk:10,def:5,name:'',x:400,y:300,ready:false,prevAtk:10,prevDef:5,gold:0,class:0,classIcon:'',talentPts:0,talents:[]};
let ents={},inv=[],eq={},qst=[],sel=0,keys={},vx=0,vy=0,parties={},cd={},drops={},sortMode='type',invFilter='all';
let npcQuests={}; // NPC -> quest ID list from 9002
const IC={1:'🟢',2:'🔵',3:'💀',4:'🟣',5:'🟤'};

// 物品数据层 (与 logic_server ItemDef 同步)
const IT={1:{n:'铁剑',t:'weapon',i:'🗡',atk:15,def:0,hp:0,mp:0,g:100},2:{n:'钢剑',t:'weapon',i:'⚔',atk:30,def:0,hp:0,mp:0,g:300},3:{n:'皮甲',t:'armor',i:'🛡',atk:0,def:10,hp:0,mp:0,g:150},4:{n:'铁甲',t:'armor',i:'🛡',atk:0,def:25,hp:0,mp:0,g:400},5:{n:'力量戒指',t:'accessory',i:'💍',atk:10,def:5,hp:0,mp:0,g:200},6:{n:'生命药水',t:'potion',i:'🧪',atk:0,def:0,hp:50,mp:0,g:50},7:{n:'法力药水',t:'potion',i:'💧',atk:0,def:0,hp:0,mp:30,g:50},8:{n:'全恢复药水',t:'potion',i:'💎',atk:0,def:0,hp:100,mp:50,g:150},9:{n:'史莱姆凝胶',t:'material',i:'🟢',atk:0,def:0,hp:0,mp:0,g:10},10:{n:'哥布林耳朵',t:'material',i:'👂',atk:0,def:0,hp:0,mp:0,g:15}};
// 任务数据层 (与 logic_server QuestDef 同步)
const QD={1:{n:'清除史莱姆',d:'消灭5只史莱姆',mob:1,cnt:5,xp:100,rw:6},2:{n:'哥布林威胁',d:'消灭3只哥布林',mob:2,cnt:3,xp:200,rw:7},3:{n:'骷髅清剿',d:'消灭2只骷髅战士',mob:3,cnt:2,xp:350,rw:1},4:{n:'暗影威胁',d:'消灭1只暗影法师',mob:4,cnt:1,xp:500,rw:2},5:{n:'巨人杀手',d:'消灭1只岩石巨人',mob:5,cnt:1,xp:1000,rw:4}};
// 职业与天赋数据 (与 logic_server 同步)
const CLASSES={1:{n:'战士',icon:'⚔',atk:5,def:10,hp:50},2:{n:'法师',icon:'🔮',atk:15,def:2,hp:-20},3:{n:'弓手',icon:'🏹',atk:10,def:5,hp:0}};
const TALENTS=[{id:1,name:'剑术精通',class:1,atk:5,def:0,hp:0,icon:'⚔'},{id:2,name:'铁壁',class:1,atk:0,def:5,hp:0,icon:'🛡'},{id:3,name:'坚韧',class:1,atk:0,def:0,hp:30,icon:'❤'},{id:4,name:'法术强化',class:2,atk:8,def:0,hp:0,icon:'💥'},{id:5,name:'魔力护盾',class:2,atk:0,def:3,hp:0,icon:'🔮'},{id:6,name:'法力潮汐',class:2,atk:0,def:0,hp:20,icon:'✨'},{id:7,name:'精准射击',class:3,atk:6,def:0,hp:0,icon:'🎯'},{id:8,name:'闪避步法',class:3,atk:0,def:4,hp:0,icon:'💨'},{id:9,name:'猎人直觉',class:3,atk:0,def:0,hp:25,icon:'👁'}];
function GI(id){return IT[id]||{n:'物品'+id,i:'📦',t:'unknown',atk:0,def:0,hp:0,mp:0,g:0}}
function GQ(id){return QD[id]||{n:'任务'+id,d:'未知',mob:0,cnt:0,xp:0,rw:0}}
function EQ_BONUS(){let a=0,d=0;['weapon','armor','accessory'].forEach(s=>{const it=eq[s];if(it&&it.itemId){const di=GI(it.itemId);a+=di.atk;d+=di.def}});return{atk:a,def:d}}

// ====== Particle Effects ======
function spawnParticles(x,y,color,count,size,life,tag){
  const wrap=document.getElementById('wrap');
  for(let i=0;i<count;i++){
    const p=document.createElement('div');p.className='particle';
    const angle=Math.random()*Math.PI*2,speed=20+Math.random()*40;
    p.style.cssText=`left:${x}px;top:${y}px;width:${size}px;height:${size}px;background:${color};
      border-radius:50%;animation:none;transition:all ${life}ms ease-out;opacity:1;z-index:${tag||4}`;
    wrap.appendChild(p);
    requestAnimationFrame(()=>{
      p.style.transform=`translate(${Math.cos(angle)*speed}px,${Math.sin(angle)*speed}px) scale(0)`;
      p.style.opacity='0';
    });
    setTimeout(()=>p.remove(),life+50);
  }
}
function fxSkill(eid,skillId){
  const e=ents[eid];if(!e)return;const p=sp(e.x,e.y);
  const colors={1:'#3498db',2:'#f39c12',3:'#e74c3c',4:'#00bcd4',5:'#2ecc71'};
  const c=colors[skillId]||'#fff';
  // 技能爆发环
  const ring=document.createElement('div');ring.className='particle';
  ring.style.cssText=`left:${p.x}px;top:${p.y}px;width:30px;height:30px;background:transparent;border:2px solid ${c};border-radius:50%;animation:skillBurst .5s ease-out forwards;z-index:3`;
  document.getElementById('wrap').appendChild(ring);
  setTimeout(()=>ring.remove(),500);
  spawnParticles(p.x,p.y,c,8,4,400,3);
}
function fxCrit(eid){
  const e=ents[eid];if(!e)return;const p=sp(e.x,e.y);
  spawnParticles(p.x,p.y,'#ff6b00',12,6,500,5);
}
function fxKill(eid){
  const e=ents[eid]||{x:0,y:0};const p=sp(e.x,e.y);
  spawnParticles(p.x,p.y,'#e74c3c',20,8,700,5);
  spawnParticles(p.x,p.y,'#f1c40f',10,5,600,5);
}
function fxHeal(x,y){
  spawnParticles(x,y,'#2ecc71',10,5,500,4);
}
function fxDrop(x,y){
  const p=sp(x,y);
  spawnParticles(p.x,p.y,'#ffd700',6,3,400,4);
}

function showDmg(eid,dmg,crit){
  const e=ents[eid];if(!e)return;const p=sp(e.x,e.y);
  const d=document.createElement('div');d.className='dmg'+(crit?' dmg-crit':'');
  d.textContent=dmg>0?'-'+dmg:'MISS';
  d.style.color=(dmg>0&&!crit)?'#ff4444':(dmg>0?'#ff6b00':'#888');
  d.style.left=p.x+'px';d.style.top=(p.y-30)+'px';
  document.getElementById('wrap').appendChild(d);
  setTimeout(()=>d.remove(),800);
}

// ====== Stat Flash ======
let flashTimers={};
function flashStat(id,up){
  const el=document.getElementById(id);if(!el)return;
  if(flashTimers[id])clearTimeout(flashTimers[id]);
  el.classList.remove('stat-up','stat-down');
  void el.offsetWidth;
  el.classList.add(up?'stat-up':'stat-down');
  flashTimers[id]=setTimeout(()=>el.classList.remove('stat-up','stat-down'),400);
}

// ====== Equipment Compare Tooltip ======
function showCmp(itemId,slot,ev){
  const cmp=document.getElementById('cmp');const it=GI(itemId);
  const cur=eq[slot]&&eq[slot].itemId?GI(eq[slot].itemId):null;
  if(!cur){cmp.style.display='none';return}
  let html='<div class="cmp-title">⚔ 装备对比</div>';
  html+=`<div class="cmp-stat">当前: ${cur.i} ${cur.n}</div>`;
  if(it.atk!==cur.atk){const d=it.atk-cur.atk;html+=`<div class="cmp-stat">攻击: ${cur.atk} → ${it.atk} <span class="cmp-${d>0?'up':d<0?'down':'same'}">${d>0?'+':''}${d}</span></div>`}
  if(it.def!==cur.def){const d=it.def-cur.def;html+=`<div class="cmp-stat">防御: ${cur.def} → ${it.def} <span class="cmp-${d>0?'up':d<0?'down':'same'}">${d>0?'+':''}${d}</span></div>`}
  html+=`<div style="color:#888;font-size:10px">点击装备进行替换</div>`;
  cmp.innerHTML=html;cmp.style.display='block';
  const rect=ev.target.getBoundingClientRect();
  cmp.style.left=(rect.right+8)+'px';cmp.style.top=(rect.top-20)+'px';
  // keep in bounds
  const cr=cmp.getBoundingClientRect();
  if(cr.right>window.innerWidth-280)cmp.style.left=(rect.left-cr.width-8)+'px';
}
function hideCmp(){document.getElementById('cmp').style.display='none'}

// ====== Inventory Sort ======
function sortInv(){
  const modes=['type','value','name'];sortMode=modes[(modes.indexOf(sortMode)+1)%modes];
  document.querySelector('.sort-btn').textContent='↕整理('+{type:'类型',value:'价值',name:'名称'}[sortMode]+')';
  R();
}
function getInvSorted(){
  const im={};inv.forEach(({itemId,count})=>{const c=count||1;im[itemId]=(im[itemId]||0)+c});
  let entries=Object.entries(im).map(([id,c])=>[parseInt(id),c,GI(parseInt(id))]);
  if(sortMode==='type'){
    const order={weapon:0,armor:1,accessory:2,potion:3,material:4};
    entries.sort((a,b)=>((order[a[2].t]||9)-(order[b[2].t]||9))||(b[2].g-a[2].g));
  }else if(sortMode==='value'){
    entries.sort((a,b)=>b[2].g-a[2].g);
  }else{
    entries.sort((a,b)=>a[2].n.localeCompare(b[2].n));
  }
  return entries;
}

// ====== Message Dispatch ======
async function onD(data){let off=0;while(off+H<=data.length){if(data[off]!==M[0]||data[off+1]!==M[1]){off++;continue}const v=new DataView(data.buffer,data.byteOffset,data.byteLength);const bl=v.getUint16(off+6,false);if(off+H+bl>data.length)break;const mid=v.getUint16(off+4,false);try{const p=await D(data.subarray(off+H,off+H+bl));const j=JSON.parse(new TextDecoder().decode(p));h(mid,j)}catch(e){}off+=H+bl}}
function h(m,b){switch(m){

  if(e.npcType==='quest_giver'||questIds.length>0){
    questIds.forEach(qid=>{
      const qd=GQ(qid),has=qst.find(s=>s.questId===qid);
      const done=has&&has.progress>=has.target;
      html+=`<div class="q"><span>📜 ${qd.n} — ${qd.d}</span>${has?(done?`<button class="ok" onclick="sd(1006,{questId:${qid}});cls()">提交</button>`:`<span style="color:#27ae60">${has.progress}/${qd.cnt}</span>`):`<button onclick="sd(1005,{questId:${qid}});L('📜','接取任务: ${qd.n}');cls()">接取</button>`}</div>`;
    });
  }else if(e.npcType==='merchant'){
    // v0.6: 发送NPC交互获取商店数据
    sd(1007,{npcId:nid});cls();return;
  }else if(e.npcType==='healer'){
    html='<div class="q"><span>💚 恢复全部生命和法力</span><span style="color:#2ecc71">已恢复!</span></div>';
  }else if(e.npcType&&e.npcType.startsWith('portal')){
    // 传送门 — 发送NPC交互
    sd(1007,{npcId:nid});cls();return;
  }
  document.getElementById('dq').innerHTML=html||'<div style="color:#888">该NPC暂无功能</div>';
  dlg.style.display='block';inDlg=true;
}
function cls(){document.getElementById('dlg').style.display='none';inDlg=false;_talentOpen=false;_lbOpen=false}
async function pick(){let b=null,bd=1e9;Object.values(drops).forEach(d=>{const dist=Math.hypot(d.x-me.x,d.y-me.y);if(dist<bd&&dist<80){bd=dist;b=d}});if(b){L('💎','拾取 '+GI(b.itemId).n+'!');await sd(1003,{dropId:b.dropId});delete drops[b.dropId]}else L('💎','附近没有掉落物 (按G)')}
async function acpt(){await sd(2003,{})}

async function buyShop(id,c){await sd(1009,{itemId:id,count:c});L('🛒','购买物品 '+GI(id).n+' x'+c)}
async function sellItem(id){const h=inv.find(i=>i.itemId===id);const c=h?h.count:1;await sd(1010,{itemId:id,count:1});L('🛒','出售物品 '+GI(id).n)}

// ====== Class / Talent / Leaderboard ======
let _talentOpen=false,_lbOpen=false,lbType='level';
function showClassDialog(){
  const dlg=document.getElementById('dlg');
  document.getElementById('dt').textContent='🎓 选择你的职业';
  document.getElementById('dc').textContent='选择职业后将获得对应属性加成';
  document.getElementById('dq').innerHTML=Object.values(CLASSES).map(c=>{
    const desc='ATK+'+c.atk+' DEF+'+c.def+' HP'+(c.hp>=0?'+':'')+c.hp;
    return `<div class="q"><span>${c.icon} ${c.n} (${desc})</span><button class="ok" onclick="chooseClass(${c.id})">选择</button></div>`;
  }).join('');
  document.getElementById('da').innerHTML='';
  dlg.style.display='block';inDlg=true;
}
async function chooseClass(x){await sd(2701,{class:x});cls()}
function toggleTalentPanel(){
  if(_talentOpen){cls();return}
  if(inDlg)return;
  if(me.class===0){L('⚠','请先选择职业');return}
  _talentOpen=true;
  const dlg=document.getElementById('dlg');
  document.getElementById('dt').textContent='🌟 天赋面板 (剩余'+me.talentPts+'点)';
  document.getElementById('dc').textContent='选择天赋进行学习';
  renderTalentList();
  document.getElementById('da').innerHTML='<button onclick="cls()">关闭</button>';
  dlg.style.display='block';inDlg=true;
}
function renderTalentList(){
  const list=TALENTS.filter(t=>t.class===me.class);
  document.getElementById('dq').innerHTML=list.map(t=>{
    const active=me.talents.includes(t.id);
    const desc=[t.atk&&'ATK+'+t.atk,t.def&&'DEF+'+t.def,t.hp&&'HP+'+t.hp].filter(x=>x).join(' ');
    if(active)return `<div class="q"><span>${t.icon} ${t.name} (${desc})</span><span style="color:#2ecc71">已激活</span></div>`;
    return `<div class="q"><span>${t.icon} ${t.name} (${desc})</span><button onclick="learnTalent(${t.id})">学习</button></div>`;
  }).join('');
}
async function learnTalent(id){await sd(2702,{talentId:id});cls()}
function toggleLeaderboard(){
  if(_lbOpen){cls();return}
  if(inDlg)return;
  _lbOpen=true;
  const dlg=document.getElementById('dlg');
  document.getElementById('dt').textContent='🏆 排行榜';
  document.getElementById('dc').innerHTML='<button onclick="switchLb(\'level\')" id="lbLvl">等级榜</button><button onclick="switchLb(\'gold\')" id="lbGold">金币榜</button>';
  document.getElementById('dq').innerHTML='<div style="color:#888">加载中...</div>';
  document.getElementById('da').innerHTML='<button onclick="cls()">关闭</button>';

}
async function switchLb(t){lbType=t;document.getElementById('dq').innerHTML='<div style="color:#888">加载中...</div>';await sd(2800,{type:t})}
function showLeaderboardData(b){
  if(!_lbOpen)return;
  const lvlBtn=document.getElementById('lbLvl'),goldBtn=document.getElementById('lbGold');
  if(lvlBtn)lvlBtn.style.background=(b.type==='level'?'#27ae60':'');
  if(goldBtn)goldBtn.style.background=(b.type==='gold'?'#27ae60':'');
  const entries=b.entries||[];
  const label=b.type==='level'?'等级':'金币';
  document.getElementById('dq').innerHTML=entries.length===0?'<div style="color:#888">暂无数据</div>':entries.map(e=>`<div class="q"><span>#${e.rank} ${e.name}</span><span>${label}: ${e.value}</span></div>`).join('');
}

// ====== Startup ======
let gameStarted=false;
async function doLogin(){
  if(gameStarted)return;
  const inp=document.getElementById('uidInput');
  const err=document.getElementById('loginErr');
  err.textContent='';
  let u=parseInt(inp.value.trim());
  if(isNaN(u)){u=Math.floor(Math.random()*90000)+10000}
  if(u<1||u>999999){err.textContent='UID 范围 1-999999';return}
  gameStarted=true;
  document.getElementById('enterBtn').textContent='连接中...';
  document.getElementById('enterBtn').disabled=true;
  try{
    S('连接...');await go(u);
    await new Promise(r=>setTimeout(r,2500));
    document.getElementById('login').style.display='none';
    S('就绪');dr();
    setInterval(async()=>{if(inDlg)return;let dx=0,dy=0;if(keys['w']||keys['arrowup'])dy+=6;if(keys['s']||keys['arrowdown'])dy-=6;if(keys['a']||keys['arrowleft'])dx-=6;if(keys['d']||keys['arrowright'])dx+=6;if(dx||dy){me.x=Math.max(0,Math.min(1600,me.x+dx));me.y=Math.max(0,Math.min(1200,me.y+dy));sd(3001,{x:me.x,y:me.y,dir:0})}},100);
    setInterval(()=>sd(4001,{}),800);
    L('🎮','WASD移动 1普攻 2-5技能 QE药水 F对话 G拾取 B排行 C天赋 T组队 Enter聊天');
  }catch(e){
    gameStarted=false;
    document.getElementById('enterBtn').textContent='进入游戏';
    document.getElementById('enterBtn').disabled=false;
    err.textContent='连接失败: '+(e.message||'超时')+' — 确认网关与代理已启动';
    S('未连接');
  }
}
document.getElementById('uidInput').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
document.getElementById('uidInput').focus();
