name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  RUST_VERSION: "1.95.0"
  CARGO_TERM_COLOR: always

jobs:
  # ─── Stage 1: Format & Lint ───
  lint:
    name: Format & Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target\nlogic-lib -> logic-lib/target"
      - name: Rustfmt check
        run: cargo fmt --all -- --check
      - name: Clippy (gateway)
        run: cargo clippy --lib -- -D warnings
      - name: Clippy (logic-lib)
        run: cd logic-lib && cargo clippy --lib -- -D warnings

  # ─── Stage 2: Unit Tests ───
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target\nlogic-lib -> logic-lib/target"
      - name: Gateway TDD tests
        run: cargo test --lib
      - name: Logic-lib tests
        run: cd logic-lib && cargo test --lib
      - name: TDD integration tests
        run: |
          for t in tdd_protocol tdd_scene tdd_chat tdd_combat tdd_concurrent tdd_exception tdd_fuzz; do
            cargo test --test "$t" || true
          done

  # ─── Stage 3: Security Audit ───
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Audit dependencies
        run: cargo audit --deny warnings

  # ─── Stage 4: Docker Build ───
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test, audit]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: rust-mmo-gate:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true
      - name: Verify image
        run: docker run --rm rust-mmo-gate:${{ github.sha }} /usr/local/bin/rust-mmo-gate --version || true

  # ─── Stage 5: Release Build ───
  release:
    name: Release Build
    runs-on: ubuntu-latest
    needs: [test, audit]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target\nlogic-lib -> logic-lib/target"
      - name: Build gateway (release)
        run: cargo build --release --bin rust-mmo-gate
      - name: Build logic-server (release)
        run: cd logic-lib && cargo build --release --bin logic-server
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-binaries
          path: |
            target/release/rust-mmo-gate
            logic-lib/target/release/logic-server
          retention-days: 30
