# =============================================================================
# Rust MMO Gateway — CI Pipeline
# =============================================================================
# 代码推送 / PR 触发: lint + 编译 + 全量测试 + Benchmark
# =============================================================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ---------- Lint ----------
  lint:
    name: Clippy + Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.95.0
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('**/Cargo.lock') }}

      - name: Rustfmt check
        run: cargo fmt --all -- --check

      - name: Clippy (zero warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings

  # ---------- Unit + TDD Tests ----------
  test-unit:
    name: Unit + TDD Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.95.0
        uses: dtolnay/rust-toolchain@1.95.0

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}

      - name: Run unit tests
        run: cargo test --lib --release

      - name: Run TDD tests
        run: |
          cargo test --test tdd_concurrent --release
          cargo test --test tdd_protocol --release
          cargo test --test tdd_exception --release
          cargo test --test tdd_fuzz --release

  # ---------- BDD Tests ----------
  test-bdd:
    name: BDD Scenario Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.95.0
        uses: dtolnay/rust-toolchain@1.95.0

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-bdd-${{ hashFiles('**/Cargo.lock') }}

      - name: Run BDD tests
        run: cargo test --test bdd --release

  # ---------- Benchmark ----------
  benchmark:
    name: Performance Benchmark
    runs-on: ubuntu-latest
    needs: [test-unit, test-bdd]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.95.0
        uses: dtolnay/rust-toolchain@1.95.0

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}

      - name: Run benchmarks
        run: cargo bench --bench gate_bench -- --save-baseline ci

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: target/criterion/

  # ---------- Release Build ----------
  build-release:
    name: Release Build Verification
    runs-on: ubuntu-latest
    needs: [test-unit, test-bdd]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.95.0
        uses: dtolnay/rust-toolchain@1.95.0

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release --bin rust-mmo-gate

      - name: Verify binary
        run: |
          ls -la target/release/rust-mmo-gate
          file target/release/rust-mmo-gate
          ./target/release/rust-mmo-gate --version || true

      - name: Upload release binary
        uses: actions/upload-artifact@v4
        with:
          name: release-binary
          path: target/release/rust-mmo-gate
