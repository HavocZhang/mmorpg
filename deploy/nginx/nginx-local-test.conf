# =============================================================================
# Nginx Stream SLB — 本地测试配置
# 将流量分发到 node2 (7882) 和 node3 (7883)
# =============================================================================

upstream mmo_gateway_cluster {
    least_conn;
    server host.docker.internal:7882 max_fails=3 fail_timeout=10s;
    server host.docker.internal:7883 max_fails=3 fail_timeout=10s;
    keepalive 64;
}

server {
    listen 7890;
    proxy_pass mmo_gateway_cluster;
    proxy_connect_timeout 5s;
    proxy_timeout 300s;
    proxy_socket_keepalive on;
    proxy_next_upstream error timeout;
    proxy_next_upstream_tries 2;
    proxy_next_upstream_timeout 5s;
}
