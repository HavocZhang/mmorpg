# =============================================================================
# Nginx Stream SLB — Rust MMO Gateway 负载均衡配置
# =============================================================================
# 四层（L4）TCP 负载均衡，不解析游戏协议
# 部署: 将此配置放入 nginx.conf 的 stream { } 块中
# 注意: stream 模块不支持 keepalive、proxy_next_upstream 等 http 专用指令
# =============================================================================

# ---------- 上游网关集群 ----------
upstream mmo_gateway_cluster {
    # least_conn: 最少连接数调度（适合长连接游戏场景）
    least_conn;

    # 网关节点列表（按实际部署扩展）
    # max_fails=3: 连续 3 次失败标记为不可用
    # fail_timeout=10s: 标记不可用后 10 秒内不再尝试
    server gate-prod-01:7888 max_fails=3 fail_timeout=10s;
    server gate-prod-02:7888 max_fails=3 fail_timeout=10s;
    server gate-prod-03:7888 max_fails=3 fail_timeout=10s;

    # 备用节点
    # server gate-prod-04:7888 backup;
}

# ---------- TCP 游戏流量入口 ----------
server {
    listen 7888;
    proxy_pass mmo_gateway_cluster;

    # 连接超时
    proxy_connect_timeout 5s;
    proxy_timeout 300s;  # 5分钟无数据断开

    # TCP keepalive
    proxy_socket_keepalive on;
}

