# ═══════════════════════════════════════════════════════
#  Nginx 生产配置 — TCP L4 负载均衡 + WebSocket L7 代理
# ═══════════════════════════════════════════════════════

worker_processes auto;
events {
    worker_connections 4096;
}

# ─── TCP L4 负载均衡 (游戏流量) ───
stream {
    upstream mmo_game_backend {
        least_conn;
        server gate-1:7888 max_fails=3 fail_timeout=10s;
        server gate-2:7888 max_fails=3 fail_timeout=10s;
        server gate-3:7888 max_fails=3 fail_timeout=10s;
    }

    server {
        listen 7888;
        proxy_pass mmo_game_backend;
        proxy_connect_timeout 5s;
        proxy_timeout 300s;
        # TCP keepalive
        proxy_socket_keepalive on;
    }
}

# ─── HTTP L7 (WebSocket 代理 + 管理面板) ───
http {
    upstream mmo_ws_backend {
        ip_hash;
        server gate-1:7890 max_fails=3 fail_timeout=10s;
        server gate-2:7890 max_fails=3 fail_timeout=10s;
        server gate-3:7890 max_fails=3 fail_timeout=10s;
    }

    upstream mmo_admin_backend {
        server gate-1:9090 max_fails=3 fail_timeout=10s;
        server gate-2:9090 max_fails=3 fail_timeout=10s;
        server gate-3:9090 max_fails=3 fail_timeout=10s;
    }

    # WebSocket 入口
    server {
        listen 7890;
        location / {
            proxy_pass http://mmo_ws_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }
    }

    # 管理面板
    server {
        listen 9090;
        location / {
            proxy_pass http://mmo_admin_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
