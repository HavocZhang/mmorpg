# ═══════════════════════════════════════════════════════
#  Alertmanager 配置 — 企业微信 / 钉钉 Webhook 告警
# ═══════════════════════════════════════════════════════
#  环境变量 (docker-compose.prod.yml 中设置):
#   WECOM_WEBHOOK_URL  — 企业微信群机器人 Webhook URL
#   DINGTALK_WEBHOOK_URL — 钉钉群机器人 Webhook URL
#   DINGTALK_SECRET     — 钉钉加签密钥
# ═══════════════════════════════════════════════════════

global:
  resolve_timeout: 5m
  # SMTP 邮件告警 (可选)
  smtp_smarthost: "smtp.qq.com:587"
  smtp_from: "alert@mmo-gateway.com"
  smtp_auth_username: "alert@mmo-gateway.com"
  # smtp_auth_password: "${SMTP_PASSWORD}"

# ─── 告警模板 ───
templates:
  - "/etc/alertmanager/templates/*.tmpl"

# ─── 分组与路由 ───
route:
  group_by: ["alertname", "cluster", "severity"]
  group_wait: 10s          # 首次告警等待 10s 聚合同组
  group_interval: 30s       # 同组下次告警间隔
  repeat_interval: 4h       # 重复告警间隔
  receiver: "wecom-default"

  routes:
    # 严重告警 → 企业微信 + 钉钉 + 邮件
    - matchers:
        - severity = "critical"
      receiver: "wecom-critical"
      continue: true
    - matchers:
        - severity = "critical"
      receiver: "dingtalk-critical"

    # 警告级别 → 企业微信
    - matchers:
        - severity = "warning"
      receiver: "wecom-default"

    # 网关宕机 → 全渠道紧急通知
    - matchers:
        - alertname = "GatewayDown"
      receiver: "wecom-critical"
      continue: true
    - matchers:
        - alertname = "GatewayDown"
      receiver: "dingtalk-critical"

# ─── 抑制规则 ───
inhibit_rules:
  # 严重告警抑制同源的警告
  - source_matchers: [severity = "critical"]
    target_matchers: [severity = "warning"]
    equal: ["cluster", "alertname"]

# ─── 接收器配置 ───
receivers:
  # 企业微信 — 默认
  - name: "wecom-default"
    webhook_configs:
      - url: "http://127.0.0.1:9095/wecom"
        send_resolved: true
        max_alerts: 10

  # 企业微信 — 严重
  - name: "wecom-critical"
    webhook_configs:
      - url: "http://127.0.0.1:9095/wecom?level=critical"
        send_resolved: true

  # 钉钉 — 严重
  - name: "dingtalk-critical"
    webhook_configs:
      - url: "http://127.0.0.1:9095/dingtalk?level=critical"
        send_resolved: true

  # 邮件 (可选)
  - name: "email"
    email_configs:
      - to: "ops@mmo-gateway.com"
        send_resolved: true
        headers:
          Subject: '【MMO网关告警】{{ .GroupLabels.alertname }}'
