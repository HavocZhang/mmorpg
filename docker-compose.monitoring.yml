# =============================================================================
# Rust MMO Gateway — Full Monitoring Stack
# =============================================================================
# 一键启动完整可观测性环境:
#   gateway + redis + logic-server + prometheus + grafana + node-exporter
#
# 启动: docker-compose -f docker-compose.monitoring.yml up -d
# 停止: docker-compose -f docker-compose.monitoring.yml down
#
# 访问:
#   Gateway Admin:  http://localhost:9090
#   Prometheus:     http://localhost:9091
#   Grafana:        http://localhost:3000  (admin/admin)
# =============================================================================

version: "3.8"

services:
  # ---------- Redis ----------
  redis:
    image: redis:7-alpine
    container_name: mmo-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - mmo-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ---------- Mock gRPC Logic Server ----------
  logic-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mmo-logic-server
    restart: unless-stopped
    command: ["/app/logic-server"]
    environment:
      - GRPC_LISTEN_ADDR=0.0.0.0:50051
      - RUST_LOG=info
    ports:
      - "50051:50051"
    networks:
      - mmo-net
    depends_on:
      redis:
        condition: service_healthy

  # ---------- Gateway ----------
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mmo-gateway
    restart: unless-stopped
    env_file:
      - .env.dev.example
    environment:
      - GATE_TCP_BIND=0.0.0.0
      - GATE_HTTP_BIND=0.0.0.0
      - REDIS_URL=redis://redis:6379
      - GRPC_LOGIC_ENDPOINTS=grpc://logic-server:50051
      - RUST_LOG=info
    ports:
      - "7888:7888"
      - "9090:9090"
    volumes:
      - gateway-logs:/app/logs
    networks:
      - mmo-net
    depends_on:
      redis:
        condition: service_healthy
      logic-server:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:9090/health"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 5

  # ---------- Node Exporter (主机指标) ----------
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: mmo-node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    networks:
      - mmo-net
    pid: host

  # ---------- Redis Exporter ----------
  redis-exporter:
    image: oliver006/redis_exporter:v1.66.0
    container_name: mmo-redis-exporter
    restart: unless-stopped
    environment:
      - REDIS_ADDR=redis://redis:6379
    ports:
      - "9121:9121"
    networks:
      - mmo-net
    depends_on:
      redis:
        condition: service_healthy

  # ---------- Prometheus ----------
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: mmo-prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/prometheus/alerts:/etc/prometheus/alerts:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
      - "--web.enable-admin-api"
    networks:
      - mmo-net
    depends_on:
      gateway:
        condition: service_healthy

  # ---------- Grafana ----------
  grafana:
    image: grafana/grafana:11.3.0
    container_name: mmo-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana-data:/var/lib/grafana
    networks:
      - mmo-net
    depends_on:
      - prometheus

volumes:
  redis-data:
    driver: local
  gateway-logs:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

networks:
  mmo-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
